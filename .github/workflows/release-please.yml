name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          release-type: go
          package-name: netoffload
      - uses: step-security/docker-login-action@870af644803bf9f204aed474adbad2958fec048b # v4.1.0
        if: ${{ steps.release.outputs.release_created }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: step-security/tag-push-action@aae70939887bfb2a2ae8314fd4650381ca2cc2ae # v2.2.1
        if: ${{ steps.release.outputs.release_created }}
        with:
          src: ghcr.io/vexxhost/netoffload:${{ steps.release.outputs.sha }}
          dst: |
            ghcr.io/vexxhost/netoffload:latest
            ghcr.io/vexxhost/netoffload:${{ steps.release.outputs.tag_name }}
