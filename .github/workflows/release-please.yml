name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/release-please-action@db8f2c60ee802b3748b512940dde88eabd7b7e01 # v3
        id: release
        with:
          release-type: go
          package-name: netoffload
      - uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc # v2
        if: ${{ steps.release.outputs.release_created }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: akhilerm/tag-push-action@85bf542f43f5f2060ef76262a67ee3607cb6db37 # v2.1.0
        if: ${{ steps.release.outputs.release_created }}
        with:
          src: ghcr.io/vexxhost/netoffload:${{ steps.release.outputs.sha }}
          dst: |
            ghcr.io/vexxhost/netoffload:latest
            ghcr.io/vexxhost/netoffload:${{ steps.release.outputs.tag_name }}
